    <style>
        :root {
            --primary: #a855f7;
            --secondary: #ec4899;
            --dark-bg: #0f0c29;
            --mid-bg: #302b63;
            --light-bg: #24243e;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg), var(--mid-bg), var(--light-bg));
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Đồ hoạ trang trí SVG Background */
        .decor-svg {
            position: fixed;
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
            filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.5));
        }

        .flower-1 {
            top: -10%; left: -10%;
            width: 50vw; max-width: 600px;
            animation: float 10s ease-in-out infinite;
        }

        .flower-2 {
            bottom: -10%; right: -10%;
            width: 40vw; max-width: 500px;
            animation: float 12s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .glass-card {
            background: rgba(20, 15, 40, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(168, 85, 247, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: rgba(168, 85, 247, 0.6);
            transform: translateX(5px);
            box-shadow: -5px 5px 20px rgba(168, 85, 247, 0.15);
        }

        /* Custom Checkbox */
        .custom-checkbox input {
            display: none;
        }

        .checkmark {
            width: 28px;
            height: 28px;
            border: 2px solid #a855f7;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(0, 0, 0, 0.2);
        }

        .custom-checkbox input:checked + .checkmark {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border-color: transparent;
        }

        .checkmark svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: white;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 24;
            stroke-dashoffset: 24;
            transition: stroke-dashoffset 0.4s ease;
        }

        .custom-checkbox input:checked + .checkmark svg {
            stroke-dashoffset: 0;
        }

        /* Gradient Text */
        .text-gradient {
            background: linear-gradient(to right, #d8b4fe, #f9a8d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Modal Animation */
        #day-modal, #summary-modal {
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #day-modal.hidden-modal, #summary-modal.hidden-modal {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(168, 85, 247, 0.8); }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(236, 72, 153, 0.5); border-radius: 3px;}

        /* Progress Bar transition */
        #progress-fill { transition: width 0.5s ease-out; }

        /* Hiệu ứng ẩn mượt mà khi tick */
        .hiding-card {
            animation: slideOutUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            pointer-events: none;
        }

        @keyframes slideOutUp {
            0% { opacity: 1; transform: scale(1); max-height: 150px; margin-bottom: 1rem; padding: 1rem; border-width: 1px;}
            40% { opacity: 0; transform: scale(0.95); max-height: 150px; margin-bottom: 1rem; padding: 1rem; border-width: 1px;}
            100% { opacity: 0; transform: scale(0.9); max-height: 0; margin-bottom: 0; padding: 0; border-width: 0; overflow: hidden; }
        }

        /* Trạng thái ẩn ngay lập tức (khi load lại trang) */
        .hidden-instantly {
            opacity: 0 !important;
            max-height: 0 !important;
            margin-bottom: 0 !important;
            padding: 0 !important;
            border-width: 0 !important;
            overflow: hidden !important;
            pointer-events: none !important;
        }

        /* Hiệu ứng xuất hiện trong mây khói */
        .smoke-appear {
            animation: smokeIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            position: relative;
        }

        @keyframes smokeIn {
            0% { opacity: 0; max-height: 0; margin-bottom: 0; padding: 0; transform: translateY(-20px) scale(0.9); filter: blur(10px); }
            50% { max-height: 150px; margin-bottom: 1rem; padding: 1rem; filter: blur(5px); opacity: 0.5; }
            100% { opacity: 1; max-height: 150px; margin-bottom: 1rem; padding: 1rem; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .smoke-appear::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.6) 0%, transparent 70%);
            opacity: 0;
            animation: smokePoof 0.7s ease-out forwards;
            pointer-events: none;
            border-radius: inherit;
            z-index: 10;
        }

        @keyframes smokePoof {
            0% { transform: scale(0.8); opacity: 0.8; filter: blur(8px); }
            100% { transform: scale(1.5); opacity: 0; filter: blur(20px); }
        }

        /* Nút Undo */
        #undo-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100px);
            opacity: 0;
            pointer-events: none;
        }
        #undo-btn.show {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
    </style>

                { time: "11:45 - 13:45", name: "Ăn trưa & Ngủ trưa", note: "Bắt buộc!" },
                { time: "13:45 - 14:30", name: "Anki", note: "Lướt thẻ nhẹ nhàng" },
                { time: "14:30 - 14:40", name: "Nghe Podcast", note: "Thụ động" },
                { time: "14:40 - 16:00", name: "Ôn Sách bổ trợ", note: "Chuẩn bị Toán/MOS cho Thứ 2" },
                { time: "16:00 - Tối", name: "OFF HOÀN TOÀN 🎉", note: "Thể thao, hoàng hôn, gia đình, ngủ sớm" }
            ]
        };

        const dayNames = {
            "T2": "Thứ 2", "T3": "Thứ 3", "T4": "Thứ 4", 
            "T5": "Thứ 5", "T6": "Thứ 6", "T7": "Thứ 7", "CN": "Chủ Nhật"
        };

        const quotes = [
            "Công việc quan trọng, nhưng sức khỏe của bạn còn quan trọng hơn. Hãy đi ngủ một giấc thật ngon nhé!",
            "Bạn đã nỗ lực hết sức rồi. Đừng thức quá khuya, hãy để cơ thể được nghỉ ngơi và hồi phục.",
            "Kỷ luật là tốt, nhưng biết điểm dừng để nạp lại năng lượng mới là khôn ngoan. Chúc bạn ngủ ngon!",
            "Một ngày dài đã khép lại. Hãy thả lỏng tâm trí, hít thở sâu và vỗ về giấc ngủ của bạn.",
            "Những mục tiêu lớn cần một sức khoẻ bền bỉ. Máy móc còn cần sạc pin, ngần ngại gì mà không nghỉ ngơi sớm thôi nào!"
        ];

        // --- TRẠNG THÁI ỨNG DỤNG ---
        let currentDayKey = null;
        let currentTasks = [];
        let completedCount = 0;
        let taskStatus = []; 
        let undoStack = []; 

        // Tính ngày logic (sau 3 giờ sáng mới coi là ngày mới)
        function getLogicalDate() {
            const now = new Date();
            if (now.getHours() < 3) {
                now.setDate(now.getDate() - 1);
            }
            return now.toDateString();
        }

        // --- HÀM LƯU / TẢI LOCALSTORAGE (MÁY CHỦ TẠI CHỖ) ---
        function saveToLocalStorage() {
            const state = {
                currentDayKey,
                taskStatus,
                undoStack,
                lastLogicalDate: getLogicalDate()
            };
            localStorage.setItem('tkb_app_state', JSON.stringify(state));
        }

        function loadFromLocalStorage() {
            const savedData = localStorage.getItem('tkb_app_state');
            const currentLogicalDate = getLogicalDate();

            if (savedData) {
                const state = JSON.parse(savedData);
                // Nếu vẫn thuộc ngày cũ (trước mốc 3h sáng hôm sau) thì khôi phục tiến độ cũ
                if (state.lastLogicalDate === currentLogicalDate && state.currentDayKey) {
                    currentDayKey = state.currentDayKey;
                    taskStatus = state.taskStatus || [];
                    undoStack = state.undoStack || [];
                    currentTasks = scheduleData[currentDayKey];
                    completedCount = taskStatus.filter(Boolean).length;
                    
                    restoreUI();
                    return;
                }
            }
            // Nếu qua ngày mới (sau 3h sáng) hoặc lần đầu mở app, dọn sạch dữ liệu cũ và hiện bảng chọn thứ
            localStorage.removeItem('tkb_app_state');
            document.getElementById('day-modal').classList.remove('hidden-modal');
        }

        function restoreUI() {
            document.getElementById('day-modal').classList.add('hidden-modal');
            
            const mainContent = document.getElementById('main-content');
            mainContent.classList.remove('hidden');
            setTimeout(() => { mainContent.classList.add('opacity-100'); }, 50);

            document.getElementById('day-text').innerText = dayNames[currentDayKey];
            document.getElementById('day-text').className = currentDayKey === 'CN' ? "font-bold text-pink-400" : "font-bold text-white";

            renderSchedule();
            updateProgress();

            if (undoStack.length > 0) {
                document.getElementById('undo-btn').classList.add('show');
            } else {
                document.getElementById('undo-btn').classList.remove('show');
            }
        }

        window.openModal = function() {
            document.getElementById('day-modal').classList.remove('hidden-modal');
        };

        window.selectDay = function(dayKey) {
            currentDayKey = dayKey;
            currentTasks = scheduleData[dayKey];
            taskStatus = new Array(currentTasks.length).fill(false);
            completedCount = 0;
            undoStack = [];
            
            restoreUI();
            saveToLocalStorage();
        };

        function renderSchedule() {
            const listContainer = document.getElementById('schedule-list');
            listContainer.innerHTML = ''; 

            currentTasks.forEach((task, index) => {
                const isCompleted = taskStatus[index];
                const card = document.createElement('div');
                card.className = `glass-card mb-4 rounded-2xl p-4 flex items-center justify-between gap-4 ${isCompleted ? 'hidden-instantly' : ''}`;
                card.id = `card-${index}`;

                card.innerHTML = `
                    <div class="flex items-center gap-5 flex-1 min-w-0">
                        <label class="custom-checkbox shrink-0">
                            <input type="checkbox" onchange="toggleTask(${index}, this.checked)" ${isCompleted ? 'checked' : ''}>
                            <div class="checkmark">
                                <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            </div>
                        </label>
                        <div class="flex-1 min-w-0">
                            <div class="time-badge inline-block px-3 py-1 rounded-full bg-purple-500/20 text-purple-300 text-xs font-semibold tracking-wider mb-1">
                                ${task.time}
                            </div>
                            <h3 class="task-text text-lg font-bold text-white truncate transition-all duration-300">${task.name}</h3>
                            <p class="text-sm text-purple-200/60 truncate mt-0.5">${task.note}</p>
                        </div>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        window.toggleTask = function(index, isChecked) {
            const card = document.getElementById(`card-${index}`);
            if(card.classList.contains('hiding-card') || card.classList.contains('hidden-instantly')) return; 

            taskStatus[index] = isChecked;
            if (isChecked) {
                completedCount++;
                undoStack.push(index);
                document.getElementById('undo-btn').classList.add('show');

                card.classList.add('hiding-card');
                card.classList.remove('smoke-appear');
                
                updateProgress();
                saveToLocalStorage();
            }
        };

        window.undoLastAction = function() {
            if (undoStack.length === 0) return;

            const lastIndex = undoStack.pop();
            const card = document.getElementById(`card-${lastIndex}`);
            const checkbox = card.querySelector('input[type="checkbox"]');
            
            taskStatus[lastIndex] = false;
            if(checkbox) checkbox.checked = false;
            completedCount--;

            card.classList.remove('hiding-card', 'hidden-instantly');
            void card.offsetWidth; 
            card.classList.add('smoke-appear');

            if (undoStack.length === 0) {
                document.getElementById('undo-btn').classList.remove('show');
            }

            updateProgress();
            saveToLocalStorage();

            setTimeout(() => {
                if(!taskStatus[lastIndex]) card.classList.remove('smoke-appear');
            }, 750);
        };

        // Phím tắt Ctrl+Z
        document.addEventListener('keydown', function(event) {
            if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'z') {
                window.undoLastAction();
            }
        });

        function updateProgress() {
            const total = currentTasks.length;
            const percentage = total === 0 ? 0 : Math.round((completedCount / total) * 100);
            
            document.getElementById('progress-text').innerText = `${percentage}% (${completedCount}/${total})`;
            document.getElementById('progress-fill').style.width = `${percentage}%`;

            if (percentage === 100 && total > 0) {
                startFireworks(3000);
            }
        }

        // --- TỔNG KẾT & PHÁO HOA ---
        window.endDay = function() {
            const uncompleted = currentTasks.filter((task, index) => !taskStatus[index]);
            const summaryContent = document.getElementById('summary-inner-content');
            let html = '';
            
            if (uncompleted.length === 0) {
                html += `<div class="mb-6 relative z-10"><svg class="w-20 h-20 mx-auto text-green-400 mb-4 drop-shadow-[0_0_15px_rgba(74,222,128,0.5)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                         <h3 class="text-2xl font-bold text-green-400 mb-2">Tuyệt Đỉnh!</h3>
                         <p class="text-gray-200">Bạn đã hoàn thành 100% kế hoạch ngày hôm nay. Thật đáng tự hào!</p></div>`;
            } else {
                html += `<h3 class="text-xl font-bold text-pink-400 mb-4 relative z-10">Mục tiêu chưa hoàn thành:</h3>
                         <div class="text-left bg-black/40 rounded-xl p-4 max-h-[35vh] overflow-y-auto mb-6 border border-white/10 shadow-inner custom-scrollbar relative z-10">
                            <ul class="space-y-3">`;
                uncompleted.forEach(t => {
                    html += `<li class="flex items-start gap-3">
                                <span class="mt-1 text-pink-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></span>
                                <div>
                                    <p class="font-semibold text-white">${t.name}</p>
                                    <p class="text-xs text-purple-300 opacity-80">${t.time}</p>
                                </div>
                             </li>`;
                });
                html += `   </ul>
                         </div>`;
            }

            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            html += `<div class="p-5 bg-gradient-to-br from-purple-900/50 to-pink-900/30 rounded-xl border border-purple-500/30 relative overflow-hidden z-10">
                        <div class="absolute -top-4 -left-4 text-purple-500/20 text-6xl font-serif">"</div>
                        <p class="italic text-purple-100 relative z-10 leading-relaxed font-light">${randomQuote}</p>
                     </div>`;
            
            summaryContent.innerHTML = html;
            document.getElementById('summary-modal').classList.remove('hidden-modal');
            startFireworks();
        };

        window.closeSummary = function() {
            document.getElementById('summary-modal').classList.add('hidden-modal');
            stopFireworks();
        };

        // --- CODE PHÁO HOA CANVAS ---
        const fireworksCanvas = document.getElementById('fireworks');
        const ctx = fireworksCanvas.getContext('2d');
        let fwWidth, fwHeight;
        let particles = [];
        let animationId = null;
        let autoShootInterval = null;

        function resizeCanvas() {
            fwWidth = window.innerWidth;
            fwHeight = window.innerHeight;
            fireworksCanvas.width = fwWidth;
            fireworksCanvas.height = fwHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 3;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.friction = 0.95;
                this.gravity = 0.15;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01;
                this.history = [];
            }
            update() {
                this.history.push({x: this.x, y: this.y});
                if(this.history.length > 8) this.history.shift();
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw(ctx) {
                ctx.beginPath();
                if(this.history.length > 0) ctx.moveTo(this.history[0].x, this.history[0].y);
                else ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = `hsla(${this.color}, 100%, 65%, ${Math.max(0, this.alpha)})`;
                ctx.lineWidth = 3.5;
                ctx.lineCap = "round";
                ctx.stroke();
            }
        }

        function createExplosion(x, y) {
            const baseColor = Math.random() * 360;
            for (let i = 0; i < 70; i++) {
                particles.push(new Particle(x, y, baseColor + Math.random()*50-25));
            }
        }

        function animateFireworks() {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
            ctx.fillRect(0, 0, fwWidth, fwHeight);
            ctx.globalCompositeOperation = 'lighter';
            
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw(ctx);
                if (p.alpha <= 0) particles.splice(i, 1);
            }
            animationId = requestAnimationFrame(animateFireworks);
        }

        function startFireworks(duration = 0) {
            fireworksCanvas.classList.remove('hidden');
            resizeCanvas();
            if(!animationId) animateFireworks();
            
            const shoot = () => {
                const x = fwWidth * 0.2 + Math.random() * (fwWidth * 0.6);
                const y = fwHeight * 0.1 + Math.random() * (fwHeight * 0.4);
                createExplosion(x, y);
            };
            shoot(); shoot();
            clearInterval(autoShootInterval);
            autoShootInterval = setInterval(shoot, 800);

            if (duration > 0) setTimeout(stopFireworks, duration);
        }

        function stopFireworks() {
            clearInterval(autoShootInterval);
            setTimeout(() => {
                if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
                ctx.clearRect(0, 0, fwWidth, fwHeight);
                fireworksCanvas.classList.add('hidden');
                particles = [];
            }, 2000);
        }

        // --- KHỞI CHẠY KHI MỞ TRANG ---
        window.onload = function() {
            resizeCanvas();
            loadFromLocalStorage();
        };
    </script>
    <style>
        @keyframes slide {
            from { background-position: 0 0; }
            to { background-position: 40px 0; }
        }
    </style>
</body>
</html>
